name: Build iOS App with Go xcframework

on:
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      # — Step 1: Checkout iOS app repo —
      - name: Checkout iOS app repository
        uses: actions/checkout@v4

      # — Step 2: Set up Go —
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # — Step 3: Install gomobile tools —
      - name: Install gomobile tools
        run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      # — Step 4: Clone Go core library and build xcframework —
      - name: Clone Go core library
        run: |
          git clone https://${{ secrets.PRIVATE_REPO_ACCESS_TOKEN }}@github.com/xf22001/probe_web.git go-core-lib

      - name: Configure Go module
        working-directory: ./go-core-lib
        run: |
          if [ ! -f go.mod ]; then
            go mod init probetool
          fi
          go mod tidy
          go get golang.org/x/mobile/bind

      - name: Initialize gomobile
        run: gomobile init

      - name: Build iOS .xcframework
        working-directory: ./go-core-lib
        run: |
          gomobile bind -target=ios -o ProbeTool.xcframework probetool/server

      - name: Copy xcframework to libs
        run: |
          mkdir -p libs
          cp -a go-core-lib/ProbeTool.xcframework libs/

      - name: Copy static files
        run: |
          rm -rf ProbeToolApp/Static
          cp -a go-core-lib/static ProbeToolApp/Static

      # — Step 5: Install code signing certificates —
      - name: Install distribution certificate
        if: env.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 != ''
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_DISTRIBUTION_CERTIFICATE_BASE64" | base64 -d > /tmp/distribution.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import /tmp/distribution.p12 -k build.keychain -P "$APPLE_DISTRIBUTION_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

      - name: Install provisioning profile
        if: env.APPLE_PROVISIONING_PROFILE_BASE64 != ''
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 -d > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      # — Step 6: Install XcodeGen and generate project —
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # — Step 7: Build and archive —
      - name: Archive app
        run: |
          SIGNING_ARGS="CODE_SIGN_IDENTITY=\"\" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO"

          if [ -n "${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}" ]; then
            echo "Using distribution signing..."
            SIGNING_ARGS=""
          else
            echo "No signing secrets configured — building unsigned archive"
          fi

          xcodebuild archive \
            -project ProbeTool.xcodeproj \
            -scheme ProbeTool \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/ProbeTool.xcarchive \
            $SIGNING_ARGS

      # — Step 8: Export IPA (only when signing is configured) —
      - name: Export IPA
        if: env.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 != ''
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          PROVISIONING_PROFILE_NAME: ${{ secrets.PROVISIONING_PROFILE_NAME }}
        run: |
          envsubst < exportOptions.plist > /tmp/exportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/ProbeTool.xcarchive \
            -exportPath build/output \
            -exportOptionsPlist /tmp/exportOptions.plist

      # — Step 9: Upload to App Store Connect —
      - name: Upload to App Store Connect
        if: env.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 != '' && env.APPSTORE_CONNECT_API_KEY_BASE64 != ''
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          echo "$APPSTORE_CONNECT_API_KEY_BASE64" | base64 -d > /tmp/api_key.p8
          xcrun altool --upload-app \
            -f build/output/ProbeTool.ipa \
            -t ios \
            --apiKey "$APPSTORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APPSTORE_CONNECT_API_KEY_ISSUER_ID"

      # — Step 10: TestFlight link generation —
      - name: TestFlight public link
        if: env.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 != '' && env.APPSTORE_CONNECT_API_KEY_BASE64 != ''
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
          APPSTORE_CONNECT_API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          APPSTORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ISSUER_ID }}
        run: |
          echo "=========================================="
          echo "  IPA uploaded to App Store Connect"
          echo ""
          echo "  1. Open App Store Connect:"
          echo "     https://appstoreconnect.apple.com"
          echo ""
          echo "  2. Go to: My Apps → Probe Tool → TestFlight"
          echo ""
          echo "  3. Wait for processing (~30 min), then"
          echo "     add testers under 'Internal Testing' or"
          echo "     enable 'Public Link' under External Testing"
          echo ""
          echo "  TestFlight install link:"
          echo "  https://testflight.apple.com/join/<code>"
          echo "=========================================="

      # — Step 11: Upload artifacts —
      - name: Upload xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: probetool-ios-xcarchive
          path: build/ProbeTool.xcarchive
          retention-days: 7

      - name: Upload IPA artifact
        if: env.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 != ''
        env:
          APPLE_DISTRIBUTION_CERTIFICATE_BASE64: ${{ secrets.APPLE_DISTRIBUTION_CERTIFICATE_BASE64 }}
        uses: actions/upload-artifact@v4
        with:
          name: probetool-ios-ipa
          path: build/output/*.ipa
          retention-days: 7

      - name: Upload xcframework artifact
        uses: actions/upload-artifact@v4
        with:
          name: probetool-xcframework
          path: libs/ProbeTool.xcframework
          retention-days: 7
